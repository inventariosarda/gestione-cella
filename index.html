<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" href="icona.png">
    
    <link rel="icon" type="image/png" sizes="192x192" href="icona.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icona.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gestione Pedane Grattugiato</title>
    
    <script src="https://unpkg.com/dexie@latest/dist/dexie.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; user-select: none; }
        .active-tab { background-color: #1e3a8a !important; color: white !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 flex flex-col min-h-screen pb-20">

    <header class="bg-blue-800 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold tracking-wide">📦 Gestione Pedane</h1>
            <span id="connection-status" class="text-xs opacity-80">Verifica in corso...</span>
        </div>
        <button onclick="sincronizzaCloud()" class="bg-yellow-500 hover:bg-yellow-600 text-blue-950 font-bold px-3 py-2 rounded-xl text-xs flex items-center gap-1 shadow">
            🔄 <span id="sync-text">Sincronizza Cloud</span>
        </button>
    </header>

    <div id="custom-notification" class="fixed top-18 left-4 right-4 z-50 hidden transform transition-all duration-300">
        <div id="notification-box" class="p-4 rounded-xl shadow-xl flex items-center justify-between text-white font-bold">
            <span id="notification-message"></span>
            <button onclick="chiudiNotifica()" class="ml-2 bg-black bg-opacity-20 rounded px-2 py-1 text-sm">✕</button>
        </div>
    </div>

    <div id="modal-prelievo" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl space-y-4">
            <h3 class="text-lg font-bold text-gray-900 border-b pb-2">📤 Prelievo Pedane</h3>
            <div class="text-sm text-gray-600 space-y-1">
                <p><strong>Articolo:</strong> <span id="modal-prod-nome"></span></p>
                <p><strong>Lotto:</strong> <span id="modal-lotto-nome"></span></p>
                <p><strong>Scadenza:</strong> <span id="modal-scad-data"></span></p>
                <p><strong>Disponibili in cella:</strong> <span id="modal-disp-qta" class="font-bold text-blue-700"></span> pedane</p>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Quante pedane vuoi prelevare?</label>
                <input type="number" id="modal-quantita-prelievo" min="1" value="1" class="w-full p-3 border rounded-lg text-lg text-center font-bold text-blue-900 focus:outline-none">
            </div>
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button onclick="chiudiModalePrelievo()" class="bg-gray-200 text-gray-700 py-3 rounded-xl font-bold">Annulla</button>
                <button onclick="confermaPrelievoModale()" class="bg-red-600 text-white py-3 rounded-xl font-bold shadow-md">Conferma OUT</button>
            </div>
        </div>
    </div>

    <main class="flex-grow p-4 max-w-md mx-auto w-full">

        <section id="section-movimentazione" class="tab-content">
            <h2 class="text-lg font-bold mb-4 text-blue-900 border-b pb-2">🔄 Movimentazione Pedane</h2>
            <div class="bg-white p-4 rounded-xl shadow-md space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Seleziona Prodotto:</label>
                    <select id="mov-prodotto" onchange="aggiornaVistaMovimento()" class="w-full p-3 border rounded-lg bg-white text-lg"></select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Tipo Movimento:</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button type="button" id="btn-tipo-entrata" onclick="setTipoMovimento('ENTRATA')" class="py-3 px-4 rounded-lg font-bold border-2 border-green-600 bg-green-50 text-green-700">📥 IN (Creata)</button>
                        <button type="button" id="btn-tipo-uscita" onclick="setTipoMovimento('USCITA')" class="py-3 px-4 rounded-lg font-bold border-2 border-gray-300 text-gray-500">📤 OUT (Preleva)</button>
                    </div>
                </div>

                <div id="container-carico-manuale" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1">Numero Pedane da Caricare:</label>
                        <input type="number" id="mov-quantita" min="1" value="1" class="w-full p-3 border rounded-lg text-lg text-center font-bold">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Lotto:</label>
                        <input type="text" id="mov-lotto" placeholder="Es. L12345" class="w-full p-3 border rounded-lg text-lg uppercase font-semibold">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Data Scadenza:</label>
                        <input type="date" id="mov-scadenza" class="w-full p-3 border rounded-lg text-lg">
                    </div>
                    <button onclick="registraCarico()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg">REGISTRA ENTRATA</button>
                </div>

                <div id="container-scarico-lotti" class="space-y-3 hidden">
                    <label class="block text-sm font-semibold text-gray-700">Tocca il lotto da prelevare della cella:</label>
                    <div id="lista-lotti-prelievo" class="space-y-2 max-h-64 overflow-y-auto pr-1"></div>
                </div>
            </div>
        </section>

        <section id="section-giacenza" class="tab-content hidden">
            <h2 class="text-lg font-bold mb-4 text-blue-900 border-b pb-2">📊 Giacenza Attuale Condivisa</h2>
            <div id="giacenza-lista" class="space-y-3"></div>
        </section>

        <section id="section-setup" class="tab-content hidden">
            <h2 class="text-lg font-bold mb-4 text-blue-900 border-b pb-2">⚙️ Setup Prodotti</h2>
            <div class="bg-white p-4 rounded-xl shadow-md mb-6 space-y-3">
                <h3 class="font-bold text-gray-700">Aggiungi Nuovo Articolo</h3>
                <input type="text" id="setup-nome-prodotto" placeholder="Es. Grattugiato 100g" class="w-full p-3 border rounded-lg text-lg">
                <button onclick="aggiungiProdotto()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold">+ Inserisci Prodotto</button>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-md">
                <h3 class="font-bold text-gray-700 mb-3">Articoli a Catalogo</h3>
                <ul id="setup-lista-prodotti" class="divide-y divide-gray-200"></ul>
            </div>
        </section>

        <section id="section-inventario" class="tab-content hidden">
            <div class="border-b pb-2 mb-4 flex justify-between items-center">
                <h2 class="text-lg font-bold text-blue-900">📝 Rettifica/Inventario</h2>
                <button onclick="salvaInventarioGenerale()" class="bg-red-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow-md">SALVA TUTTO</button>
            </div>
            <div id="inventario-container" class="space-y-4"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-2 shadow-lg z-50">
        <button onclick="switchTab('movimentazione')" id="nav-movimentazione" class="flex flex-col items-center justify-center w-full text-xs text-gray-600 font-medium active-tab py-1"><span class="text-xl">🔄</span><span>Movimento</span></button>
        <button onclick="switchTab('giacenza')" id="nav-giacenza" class="flex flex-col items-center justify-center w-full text-xs text-gray-600 font-medium py-1"><span class="text-xl">📊</span><span>Giacenza</span></button>
        <button onclick="switchTab('inventario')" id="nav-inventario" class="flex flex-col items-center justify-center w-full text-xs text-gray-600 font-medium py-1"><span class="text-xl">📝</span><span>Inventario</span></button>
        <button onclick="switchTab('setup')" id="nav-setup" class="flex flex-col items-center justify-center w-full text-xs text-gray-600 font-medium py-1"><span class="text-xl">⚙️</span><span>Setup</span></button>
    </nav>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLoo9i7DxIFwcuiKSP1dv1DEBdMd9YPN59o_9qqGo7tAsutI6ua3UjEQF6_-ItSwSM/exec";

        const db = new Dexie("DatabaseGrattugiatoCondiviso");
        db.version(1).stores({
            prodotti: '++id, &nome',
            giacenze: '++id, idProdotto, [idProdotto+lotto+scadenza]'
        });

        let tipoMovimentoSelezionato = 'ENTRATA';
        let lottoScaricandoSelezionato = null;

        function mostraNotifica(messaggio, tipo = 'successo') {
            const notifCont = document.getElementById('custom-notification');
            const notifBox = document.getElementById('notification-box');
            const notifMsg = document.getElementById('notification-message');
            notifMsg.innerText = messaggio;
            if (tipo === 'successo') notifBox.className = "p-4 rounded-xl flex justify-between text-white font-bold bg-green-600";
            else if (tipo === 'errore') notifBox.className = "p-4 rounded-xl flex justify-between text-white font-bold bg-red-600";
            else notifBox.className = "p-4 rounded-xl flex justify-between text-white font-bold bg-blue-600";
            notifCont.classList.remove('hidden');
            setTimeout(() => chiudiNotifica(), 3500);
        }

        function chiudiNotifica() { document.getElementById('custom-notification').classList.add('hidden'); }

        async function initApp() {
            aggiornaStatoConnessione();
            window.addEventListener('online', aggiornaStatoConnessione);
            window.addEventListener('offline', aggiornaStatoConnessione);

            try {
                const countProd = await db.prodotti.count();
                if (countProd === 0) {
                    await db.prodotti.bulkAdd([
                        { nome: "BRONZETTO 100GR" },
                        { nome: "PASCOLI ITALIANI 100GR" },
                        { nome: "BUONA SPESA 100GR" }
                    ]);
                }
                await caricaProdotti();
                
                if (!GOOGLE_SCRIPT_URL.includes("INSERISCI_QUI")) {
                    await scaricaDatiDaCloud();
                } else {
                    document.getElementById('sync-text').innerText = "Configura URL";
                    await renderGiacenze();
                }
            } catch (error) {
                console.error("Errore nell'inizializzazione:", error);
            }
        }

        function aggiornaStatoConnessione() {
            const status = document.getElementById('connection-status');
            if (navigator.onLine) { status.innerText = "Dispositivo Connesso"; status.className = "text-xs text-green-300"; }
            else { status.innerText = "Offline (Usa dati locali)"; status.className = "text-xs text-red-300"; }
        }

        function estraiDataPura(stringaData) {
            if (!stringaData) return "";
            if (stringaData.includes("T")) {
                return stringaData.split("T")[0];
            }
            let d = new Date(stringaData);
            if (!isNaN(d.getTime())) {
                let anno = d.getFullYear();
                let mese = String(d.getMonth() + 1).padStart(2, '0');
                let giorno = String(d.getDate()).padStart(2, '0');
                return `${anno}-${mese}-${giorno}`;
            }
            return stringaData;
        }

        async function scaricaDatiDaCloud() {
            if (!navigator.onLine || GOOGLE_SCRIPT_URL.includes("INSERISCI_QUI")) return;
            document.getElementById('sync-text').innerText = "Download...";
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const cloudData = await response.json();
                
                if (Array.isArray(cloudData)) {
                    await db.giacenze.clear();
                    
                    if (cloudData.length > 0) {
                        // LOGICA DI AUTO-APPRENDIMENTO DEI NUOVI ARTICOLI
                        for (const item of cloudData) {
                            const targetId = parseInt(item.idProdotto);
                            const targetNome = item.prodottoNome ? item.prodottoNome.trim().toUpperCase() : "";
                            
                            if (!isNaN(targetId) && targetNome) {
                                // Controlla se il prodotto esiste già per ID o per Nome nel catalogo locale
                                const esistePerId = await db.prodotti.get(targetId);
                                const esistePerNome = await db.prodotti.where('nome').equals(targetNome).first();
                                
                                if (!esistePerId && !esistePerNome) {
                                    // Se non esiste, lo inserisce mantenendo l'ID coerente del foglio cloud
                                    await db.prodotti.add({ id: targetId, nome: targetNome });
                                }
                            }
                        }
                        
                        // Ricarica la lista prodotti aggiornata in memoria
                        await caricaProdotti();

                        const formattedData = cloudData.map(item => ({
                            idProdotto: parseInt(item.idProdotto),
                            prodottoNome: item.prodottoNome ? item.prodottoNome.trim().toUpperCase() : "Articolo Sconosciuto",
                            lotto: item.lotto,
                            scadenza: estraiDataPura(item.scadenza),
                            quantita: parseInt(item.quantita)
                        }));
                        await db.giacenze.bulkAdd(formattedData);
                    }
                    document.getElementById('sync-text').innerText = "Sincronizzato";
                }
            } catch (e) {
                console.error("Errore download:", e);
                document.getElementById('sync-text').innerText = "Errore Sync";
            }
        }

        async function inviaDatiACloud() {
            if (GOOGLE_SCRIPT_URL.includes("INSERISCI_QUI")) return;
            if (!navigator.onLine) {
                document.getElementById('sync-text').innerText = "Sincronizza Cloud";
                mostraNotifica("Salvato sul telefono! Ricordati di sincronizzare quando c'è campo.", "info");
                return;
            }
            document.getElementById('sync-text').innerText = "Invio Cloud...";
            try {
                const locales = await db.giacenze.toArray();
                const datiProtetti = locales.map(l => ({
                    idProdotto: l.idProdotto,
                    prodottoNome: l.prodottoNome,
                    lotto: l.lotto,
                    scadenza: estraiDataPura(l.scadenza),
                    quantita: l.quantita
                }));
                
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(datiProtetti)
                });
                document.getElementById('sync-text').innerText = "Sincronizzato";
            } catch (e) {
                console.error("Errore invio cloud:", e);
                document.getElementById('sync-text').innerText = "Errore Invio";
                mostraNotifica("Errore invio cloud. Dati al sicuro sul telefono.", "errore");
            }
        }

        async function sincronizzaCloud() {
            if (!navigator.onLine) {
                return mostraNotifica("Nessuna connessione internet disponibile!", "errore");
            }
            document.getElementById('sync-text').innerText = "Allineamento...";
            try {
                const locales = await db.giacenze.toArray();
                const datiProtetti = locales.map(l => ({
                    idProdotto: l.idProdotto,
                    prodottoNome: l.prodottoNome,
                    lotto: l.lotto,
                    scadenza: estraiDataPura(l.scadenza),
                    quantita: l.quantita
                }));
                
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(datiProtetti)
                });
                
                await scaricaDatiDaCloud();
                await renderGiacenze();
                mostraNotifica("Giacenze Cloud Allineate con tutti i dispositivi!");
            } catch (e) {
                console.error(e);
                mostraNotifica("Errore durante l'allineamento cloud.", "errore");
                document.getElementById('sync-text').innerText = "Errore Sync";
            }
        }

        async function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.add('hidden'));
            document.getElementById(`section-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`nav-${tabId}`).classList.add('active-tab');
            
            if (navigator.onLine && !GOOGLE_SCRIPT_URL.includes("INSERISCI_QUI")) {
                await scaricaDatiDaCloud();
            }
            
            if (tabId === 'giacenza') await renderGiacenze();
            if (tabId === 'inventario') await renderInventario();
            if (tabId === 'movimentazione') await aggiornaVistaMovimento();
            if (tabId === 'setup') await caricaProdotti();
        }

        function setTipoMovimento(tipo) {
            tipoMovimentoSelezionato = tipo;
            const btnEntrata = document.getElementById('btn-tipo-entrata');
            const btnUscita = document.getElementById('btn-tipo-uscita');
            if (tipo === 'ENTRATA') {
                btnEntrata.className = "py-3 px-4 rounded-lg font-bold border-2 border-green-600 bg-green-50 text-green-700";
                btnUscita.className = "py-3 px-4 rounded-lg font-bold border-2 border-gray-300 text-gray-500";
            } else {
                btnUscita.className = "py-3 px-4 rounded-lg font-bold border-2 border-red-600 bg-red-50 text-red-700";
                btnEntrata.className = "py-3 px-4 rounded-lg font-bold border-2 border-gray-300 text-gray-500";
            }
            aggiornaVistaMovimento();
        }

        function visualizzaDataItaliana(stringaData) {
            if(!stringaData) return "";
            const parti = stringaData.split("-");
            if(parti.length === 3) {
                return `${parti[2]}/${parti[1]}/${parti[0]}`;
            }
            return new Date(stringaData).toLocaleDateString('it-IT');
        }

        async function aggiornaVistaMovimento() {
            const selectMov = document.getElementById('mov-prodotto');
            if (!selectMov.value) return;
            const idProdotto = parseInt(selectMov.value);
            const containerCarico = document.getElementById('container-carico-manuale');
            const containerScarico = document.getElementById('container-scarico-lotti');

            if (tipoMovimentoSelezionato === 'ENTRATA') {
                containerCarico.classList.remove('hidden');
                containerScarico.classList.add('hidden');
            } else {
                containerCarico.classList.add('hidden');
                containerScarico.classList.remove('hidden');
                const listaLottiContainer = document.getElementById('lista-lotti-prelievo');
                if (isNaN(idProdotto)) return;

                const lottiDisponibili = await db.giacenze.where('idProdotto').equals(idProdotto).toArray();
                lottiDisponibili.sort((a, b) => new Date(a.scadenza) - new Date(b.scadenza));
                
                if (lottiDisponibili.length === 0) {
                    listaLottiContainer.innerHTML = `<div class="p-4 border-2 border-dashed text-center text-gray-500 text-sm rounded-xl">❌ Nessun lotto in cella.</div>`;
                } else {
                    listaLottiContainer.innerHTML = lottiDisponibili.map(l => `
                        <button onclick="apriModalePrelievo(${l.id})" class="w-full text-left p-3 border border-gray-200 bg-gray-50 rounded-xl flex justify-between items-center active:scale-95">
                            <div>
                                <div class="font-bold text-gray-900">Lotto: ${l.lotto}</div>
                                <div class="text-xs text-gray-500">Scadenza: ${visualizzaDataItaliana(l.scadenza)}</div>
                            </div>
                            <span class="bg-blue-100 text-blue-800 font-extrabold px-3 py-1 rounded-lg text-sm">${l.quantita} pedane</span>
                        </button>
                    `).join('');
                }
            }
        }

        async function caricaProdotti() {
            const list = await db.prodotti.toArray();
            // Ordiniamo alfabeticamente per comodità dell'operatore
            list.sort((a, b) => a.nome.localeCompare(b.nome));
            
            document.getElementById('mov-prodotto').innerHTML = list.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
            document.getElementById('setup-lista-prodotti').innerHTML = list.map(p => `
                <li class="flex justify-between items-center py-3"><span class="font-medium">${p.nome}</span><button onclick="eliminaProdotto(${p.id})" class="text-red-500 text-sm">Elimina</button></li>
            `).join('');
        }

        async function aggiungiProdotto() {
            const nomeInput = document.getElementById('setup-nome-prodotto');
            const nome = nomeInput.value.trim().toUpperCase();
            if (!nome) return mostraNotifica("Nome non valido!", "errore");
            try {
                // Generiamo un ID timestamp numerico per evitare conflitti tra i vari telefoni offline
                const nuovoId = Date.now();
                await db.prodotti.add({ id: nuovoId, nome: nome });
                nomeInput.value = "";
                await caricaProdotti();
                await aggiornaVistaMovimento();
                mostraNotifica("Articolo salvato!");
            } catch (e) { mostraNotifica("Articolo già esistente.", "errore"); }
        }

        async function eliminaProdotto(id) {
            if (confirm("Vuoi eliminare l'articolo e le sue giacenze?")) {
                await db.prodotti.delete(id);
                await db.giacenze.where('idProdotto').equals(id).delete();
                await caricaProdotti();
                await inviaDatiACloud();
                mostraNotifica("Articolo rimosso.");
            }
        }

        async function registraCarico() {
            const idProdotto = parseInt(document.getElementById('mov-prodotto').value);
            const quantita = parseInt(document.getElementById('mov-quantita').value);
            const lotto = document.getElementById('mov-lotto').value.trim().toUpperCase();
            const scadenzaRaw = document.getElementById('mov-scadenza').value;

            if (isNaN(idProdotto) || isNaN(quantita) || quantita <= 0 || !lotto || !scadenzaRaw) {
                return mostraNotifica("Compila tutti i campi obbligatori!", "errore");
            }

            const scadenza = estraiDataPura(scadenzaRaw);
            const productoObj = await db.prodotti.get(idProdotto);
            const nomeProdottoSicuro = productoObj ? productoObj.nome : "Articolo Sconosciuto";

            const recordEsistente = await db.giacenze.where({ idProdotto: idProdotto, lotto: lotto, scadenza: scadenza }).first();

            if (recordEsistente) {
                await db.giacenze.update(recordEsistente.id, { quantita: recordEsistente.quantita + quantita });
            } else {
                await db.giacenze.add({ idProdotto: idProdotto, prodottoNome: nomeProdottoSicuro, lotto: lotto, scadenza: scadenza, quantita: quantita });
            }

            mostraNotifica(`Caricate ${quantita} pedane del Lotto ${lotto}`);
            document.getElementById('mov-quantita').value = "1";
            document.getElementById('mov-lotto').value = "";
            document.getElementById('mov-scadenza').value = "";
            
            await inviaDatiACloud();
            switchTab('giacenza');
        }

        async function apriModalePrelievo(idGiacenza) {
            const record = await db.giacenze.get(idGiacenza);
            if (!record) return;
            lottoScaricandoSelezionato = record;
            document.getElementById('modal-prod-nome').innerText = record.prodottoNome || "Articolo";
            document.getElementById('modal-lotto-nome').innerText = record.lotto;
            document.getElementById('modal-scad-data').innerText = visualizzaDataItaliana(record.scadenza);
            document.getElementById('modal-disp-qta').innerText = record.quantita;
            document.getElementById('modal-quantita-prelievo').value = "1";
            document.getElementById('modal-quantita-prelievo').max = record.quantita;
            document.getElementById('modal-prelievo').classList.remove('hidden');
        }

        function chiudiModalePrelievo() { document.getElementById('modal-prelievo').classList.add('hidden'); lottoScaricandoSelezionato = null; }

        async function confermaPrelievoModale() {
            if (!lottoScaricandoSelezionato) return;
            const qtaPrelevare = parseInt(document.getElementById('modal-quantita-prelievo').value);
            if (isNaN(qtaPrelevare) || qtaPrelevare <= 0) return mostraNotifica("Quantità errata!", "errore");

            const recordGiacenza = await db.giacenze.get(lottoScaricandoSelezionato.id);
            if (!recordGiacenza) return chiudiModalePrelievo();

            const nuovaQuantita = recordGiacenza.quantita - qtaPrelevare;
            if (nuovaQuantita <= 0) await db.giacenze.delete(recordGiacenza.id);
            else await db.giacenze.update(recordGiacenza.id, { quantita: nuovaQuantita });

            mostraNotifica(`Prelevate ${qtaPrelevare} pedane del Lotto ${recordGiacenza.lotto}`);
            chiudiModalePrelievo();
            
            await inviaDatiACloud();
            switchTab('giacenza');
        }

        async function renderGiacenze() {
            const giacenze = await db.giacenze.toArray();
            const container = document.getElementById('giacenza-lista');
            if (giacenze.length === 0) {
                container.innerHTML = `<div class="bg-white p-6 rounded-xl text-center text-gray-500">Cella vuota. Registra movimenti.</div>`;
                return;
            }
            const raggruppato = {};
            giacenze.forEach(g => {
                let nomeProd = g.prodottoNome || "Articolo Sconosciuto";
                if (!raggruppato[nomeProd]) raggruppato[nomeProd] = [];
                raggruppato[nomeProd].push(g);
            });

            let html = '';
            for (const [prodotto, lotti] of Object.entries(raggruppato)) {
                lotti.sort((a, b) => new Date(a.scadenza) - new Date(b.scadenza));
                const totale = lotti.reduce((acc, curr) => acc + curr.quantita, 0);
                html += `
                    <div class="bg-white rounded-xl shadow-md overflow-hidden border">
                        <div class="bg-blue-50 px-4 py-3 flex justify-between items-center border-b">
                            <span class="font-bold text-blue-900">${prodotto}</span>
                            <span class="bg-blue-600 text-white text-xs px-2.5 py-1 rounded-full font-bold">Tot: ${totale}</span>
                        </div>
                        <div class="p-3 divide-y">
                `;
                lotti.forEach(l => {
                    html += `
                        <div class="flex justify-between items-center py-2 text-sm">
                            <div><span class="font-semibold text-gray-700">Lotto: ${l.lotto}</span><span class="mx-2 text-gray-400">|</span><span class="text-gray-500">Scad: ${visualizzaDataItaliana(l.scadenza)}</span></div>
                            <span class="font-bold text-gray-900">${l.quantita} pedane</span>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            container.innerHTML = html;
        }

        async function renderInventario() {
            const prodotti = await db.prodotti.toArray();
            prodotti.sort((a, b) => a.nome.localeCompare(b.nome));
            const container = document.getElementById('inventario-container');
            let html = '';
            for (const p of prodotti) {
                const lotti = await db.giacenze.where('idProdotto').equals(p.id).toArray();
                lotti.sort((a, b) => new Date(a.scadenza) - new Date(b.scadenza));
                html += `
                    <div class="bg-white p-4 rounded-xl shadow border-l-4 border-red-500" data-id-prodotto="${p.id}">
                        <h3 class="font-bold text-gray-900 border-b pb-1 mb-2">${p.nome}</h3>
                        <div class="space-y-2" id="lotti-inventario-${p.id}">
                `;
                lotti.forEach(g => {
                    html += `
                        <div class="flex items-center gap-2 border-b pb-2 row-lotto" data-id-giacenza="${g.id}">
                            <input type="text" value="${g.lotto}" class="w-1/4 p-2 border rounded text-sm uppercase font-bold inv-lotto">
                            <input type="date" value="${estraiDataPura(g.scadenza)}" class="w-2/5 p-2 border rounded text-sm inv-scadenza">
                            <input type="number" value="${g.quantita}" class="w-1/5 p-2 border rounded text-sm text-center font-bold inv-qta">
                            <button onclick="this.parentElement.remove()" class="text-red-500 p-2 font-bold">✕</button>
                        </div>
                    `;
                });
                html += `</div><button onclick="aggiungiRigaVuotaInventario(${p.id})" class="mt-3 text-sm text-blue-600 font-bold">+ Aggiungi riga</button></div>`;
            }
            container.innerHTML = html;
        }

        function aggiungiRigaVuotaInventario(idProdotto) {
            const div = document.createElement('div');
            div.className = "flex items-center gap-2 border-b pb-2 row-lotto";
            div.innerHTML = `
                <input type="text" class="w-1/4 p-2 border rounded text-sm uppercase font-bold inv-lotto" placeholder="Lotto">
                <input type="date" class="w-2/5 p-2 border rounded text-sm inv-scadenza">
                <input type="number" class="w-1/5 p-2 border rounded text-sm text-center font-bold inv-qta" value="1">
                <button onclick="this.parentElement.remove()" class="text-red-500 p-2 font-bold">✕</button>
            `;
            document.getElementById(`lotti-inventario-${idProdotto}`).appendChild(div);
        }

        async function salvaInventarioGenerale() {
            const cards = document.querySelectorAll('#inventario-container > div');
            for (const card of cards) {
                const idProdotto = parseInt(card.getAttribute('data-id-prodotto'));
                const nomeProdotto = card.querySelector('h3').innerText;
                const righe = card.querySelectorAll('.row-lotto');
                await db.giacenze.where('idProdotto').equals(idProdotto).delete();
                for (const riga of righe) {
                    const lotto = riga.querySelector('.inv-lotto').value.trim().toUpperCase();
                    const scadenzaRaw = riga.querySelector('.inv-scadenza').value;
                    const quantita = parseInt(riga.querySelector('.inv-qta').value);
                    if (lotto && scadenzaRaw && !isNaN(quantita)) {
                        await db.giacenze.add({ idProdotto: idProdotto, prodottoNome: nomeProdotto, lotto: lotto, scadenza: estraiDataPura(scadenzaRaw), quantita: quantita });
                    }
                }
            }
            mostraNotifica("Inventario salvato!");
            await inviaDatiACloud();
            switchTab('giacenza');
        }

        window.onload = initApp;
    </script>
</body>
</html>
