<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gestione Pedane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; user-select: none; }
        .active-tab { background-color: #1e3a8a !important; color: white !important; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 flex flex-col min-h-screen pb-24">

    <header class="bg-blue-800 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold tracking-wide">📦 Gestione Pedane</h1>
            <span id="connection-status" class="text-xs opacity-80">Connesso al Cloud</span>
        </div>
    </header>

    <div id="custom-notification" class="fixed top-20 left-4 right-4 z-50 hidden">
        <div id="notification-box" class="p-4 rounded-xl shadow-xl flex items-center justify-between text-white font-bold">
            <span id="notification-message"></span>
            <button onclick="document.getElementById('custom-notification').classList.add('hidden')" class="ml-2 bg-black bg-opacity-20 rounded px-2 py-1">✕</button>
        </div>
    </div>

    <main class="flex-grow p-4 max-w-md mx-auto w-full">
        <section id="section-movimentazione" class="tab-content active">
            <h2 class="text-lg font-bold mb-4 text-blue-900 border-b pb-2">🔄 Movimentazione</h2>
            <div class="bg-white p-4 rounded-xl shadow space-y-4">
                <select id="mov-prodotto" onchange="aggiornaVistaOUT()" class="w-full p-3 border rounded-lg bg-white"></select>
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-tipo-entrata" onclick="setTipoMovimento('ENTRATA')" class="py-3 rounded-lg font-bold border-2 border-green-600 bg-green-50 text-green-700">📥 IN</button>
                    <button id="btn-tipo-uscita" onclick="setTipoMovimento('USCITA')" class="py-3 rounded-lg font-bold border-2 border-gray-300 text-gray-500">📤 OUT</button>
                </div>
                
                <div id="container-carico-manuale" class="space-y-3">
                    <input type="number" id="mov-quantita" value="1" class="w-full p-3 border rounded-lg text-center font-bold">
                    <input type="text" id="mov-lotto" placeholder="Lotto" class="w-full p-3 border rounded-lg uppercase">
                    <input type="date" id="mov-scadenza" class="w-full p-3 border rounded-lg">
                    <button onclick="registraMovimento()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">REGISTRA MOVIMENTO</button>
                </div>

                <div id="container-scarico-lotti" class="space-y-3 hidden">
                    <p class="text-sm font-semibold text-gray-600 text-center">Seleziona lotto da scaricare:</p>
                    <div id="lista-lotti-prelievo" class="space-y-2"></div>
                </div>
            </div>
        </section>

        <section id="section-giacenza" class="tab-content">
            <h2 class="text-lg font-bold mb-4 text-blue-900">📊 Giacenza Attuale</h2>
            <div id="giacenza-lista" class="space-y-3"></div>
        </section>

        <section id="section-inventario" class="tab-content">
            <div class="flex justify-between items-center mb-4"><h2 class="text-lg font-bold text-blue-900">📝 Inventario</h2><button onclick="salvaInventarioGenerale()" class="bg-red-600 text-white px-4 py-2 rounded-lg font-bold">SALVA</button></div>
            <div id="inventario-container" class="space-y-4"></div>
        </section>

        <section id="section-setup" class="tab-content">
            <h2 class="text-lg font-bold mb-4">⚙️ Setup</h2>
            <div class="bg-white p-4 rounded-xl shadow mb-4"><input type="text" id="setup-nome-prodotto" placeholder="Nome Articolo" class="w-full p-3 border rounded-lg mb-2"><button onclick="aggiungiProdotto()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold">Aggiungi</button></div>
            <ul id="setup-lista-prodotti" class="bg-white rounded-xl shadow p-4 divide-y"></ul>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 shadow-lg z-50">
        <button onclick="switchTab('movimentazione')" id="nav-movimentazione" class="flex flex-col items-center active-tab py-1 w-full text-sm font-bold"><span>🔄</span>Mov</button>
        <button onclick="switchTab('giacenza')" id="nav-giacenza" class="flex flex-col items-center py-1 w-full text-sm font-bold"><span>📊</span>Giac</button>
        <button onclick="switchTab('inventario')" id="nav-inventario" class="flex flex-col items-center py-1 w-full text-sm font-bold"><span>📝</span>Inv</button>
        <button onclick="switchTab('setup')" id="nav-setup" class="flex flex-col items-center py-1 w-full text-sm font-bold"><span>⚙️</span>Setup</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, deleteDoc, doc, writeBatch, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0daUTnfyhdyWPpkmFoPcyAguyZq63NE0",
            authDomain: "gestionepedane.firebaseapp.com",
            projectId: "gestionepedane",
            storageBucket: "gestionepedane.firebasestorage.app",
            messagingSenderId: "865581696674",
            appId: "1:865581696674:web:876ac3f6c5b34e1ccd39fb",
            measurementId: "G-35KLQV8WSQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        const DEVICE_ID = 'D-' + Math.floor(Math.random() * 1000);

        let tipoMovimento = 'ENTRATA';
        let prodotti = [];
        let giacenze = [];

        window.onload = () => {
            onSnapshot(collection(db, "prodotti"), (snap) => {
                prodotti = snap.docs.map(d => ({...d.data(), id: d.id}));
                updateSelectProdotti();
                renderSetup();
                renderGiacenze();
            });

            onSnapshot(collection(db, "giacenze"), (snap) => {
                giacenze = snap.docs.map(d => ({...d.data(), id: d.id}));
                renderGiacenze();
                aggiornaVistaOUT();
            });
        };

        function mostraNotifica(m, t='successo') {
            const box = document.getElementById('notification-box');
            document.getElementById('notification-message').innerText = m;
            box.className = "p-4 rounded-xl shadow-xl flex justify-between font-bold text-white " + (t === 'errore' ? 'bg-red-600' : 'bg-green-600');
            document.getElementById('custom-notification').classList.remove('hidden');
            setTimeout(() => document.getElementById('custom-notification').classList.add('hidden'), 3000);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.getElementById(`section-${tabId}`).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`nav-${tabId}`).classList.add('active-tab');
            if(tabId === 'inventario') renderInventario();
        }

        window.setTipoMovimento = (t) => {
            tipoMovimento = t;
            document.getElementById('btn-tipo-entrata').className = (t === 'ENTRATA') ? "py-3 rounded-lg font-bold border-2 border-green-600 bg-green-50 text-green-700" : "py-3 rounded-lg font-bold border-2 border-gray-300 text-gray-500";
            document.getElementById('btn-tipo-uscita').className = (t === 'USCITA') ? "py-3 rounded-lg font-bold border-2 border-red-600 bg-red-50 text-red-700" : "py-3 rounded-lg font-bold border-2 border-gray-300 text-gray-500";
            document.getElementById('container-carico-manuale').classList.toggle('hidden', t === 'USCITA');
            document.getElementById('container-scarico-lotti').classList.toggle('hidden', t === 'ENTRATA');
            aggiornaVistaOUT();
        }

        function updateSelectProdotti() {
            const sel = document.getElementById('mov-prodotto');
            sel.innerHTML = prodotti.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
        }

        function aggiornaVistaOUT() {
            if(tipoMovimento !== 'USCITA') return;
            const pid = document.getElementById('mov-prodotto').value;
            const cont = document.getElementById('lista-lotti-prelievo');
            const lotti = giacenze.filter(g => g.idProdotto === pid && g.quantita > 0);
            cont.innerHTML = lotti.map(g => `
                <div class="bg-gray-50 p-3 rounded-lg flex justify-between border">
                    <div><b>${g.lotto}</b><br><small>${g.scadenza}</small></div>
                    <button onclick="preleva('${g.id}', ${g.quantita})" class="bg-red-600 text-white px-3 py-1 rounded">OUT (-1)</button>
                </div>
            `).join('');
        }

        window.preleva = async (id, qta) => {
            if(qta <= 1) await deleteDoc(doc(db, "giacenze", id));
            else await setDoc(doc(db, "giacenze", id), {...giacenze.find(x=>x.id===id), quantita: qta - 1});
            mostraNotifica("Prelevata 1 pedana");
        }

        async function registraMovimento() {
            const pid = document.getElementById('mov-prodotto').value;
            const p = prodotti.find(x => x.id === pid);
            const lotto = document.getElementById('mov-lotto').value.trim().toUpperCase();
            const scad = document.getElementById('mov-scadenza').value;
            const qta = parseInt(document.getElementById('mov-quantita').value);
            
            if(!lotto || !scad || !qta) return mostraNotifica("Compila tutto", "errore");
            
            await addDoc(collection(db, "giacenze"), { idProdotto: pid, nome: p.nome, lotto, scadenza: scad, quantita: qta });
            mostraNotifica("Registrato!");
            // RESET CAMPI
            document.getElementById('mov-quantita').value = "1";
            document.getElementById('mov-lotto').value = "";
            document.getElementById('mov-scadenza').value = "";
        }

        function renderGiacenze() {
            const cont = document.getElementById('giacenza-lista');
            cont.innerHTML = prodotti.map(p => {
                const lotti = giacenze.filter(g => g.idProdotto === p.id);
                if(lotti.length === 0) return '';
                return `
                    <div class="bg-white p-4 rounded-xl shadow mb-3">
                        <h3 class="font-bold text-blue-900 border-b mb-2">${p.nome}</h3>
                        ${lotti.map(g => `
                            <div class="flex justify-between py-1 text-sm">
                                <span>Lotto: ${g.lotto} (Scad: ${g.scadenza})</span>
                                <span class="font-bold">${g.quantita}</span>
                            </div>
                        `).join('')}
                    </div>`;
            }).join('');
        }

        async function aggiungiProdotto() {
            const nome = document.getElementById('setup-nome-prodotto').value.trim().toUpperCase();
            if(!nome) return;
            await addDoc(collection(db, "prodotti"), { nome });
            document.getElementById('setup-nome-prodotto').value = '';
        }

        window.aggiungiProdotto = aggiungiProdotto;
        window.switchTab = switchTab;
        window.registraMovimento = registraMovimento;
        window.renderGiacenze = renderGiacenze;
    </script>
</body>
</html>
