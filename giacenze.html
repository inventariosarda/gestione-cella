<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Giacenze Cella in Tempo Reale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 flex flex-col min-h-screen">

    <header class="bg-blue-900 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-lg font-bold tracking-wide">📊 Giacenze Cella Grattugiato</h1>
            <p class="text-xs opacity-80" id="ultimo-aggiornamento">Caricamento in corso...</p>
        </div>
        <button onclick="caricaGiacenzeInTempoReale()" class="bg-yellow-500 hover:bg-yellow-600 text-blue-950 font-bold px-4 py-2 rounded-xl text-xs flex items-center gap-1 shadow transition-all active:scale-95">
            🔄 <span id="btn-text">Aggiorna</span>
        </button>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full pb-8">
        
        <div id="stato-caricamento" class="hidden text-center p-4 bg-blue-50 border border-blue-200 rounded-xl mb-4 text-blue-800 text-sm font-semibold animate-pulse">
            🔄 Aggiornamento giacenze dal cloud...
        </div>

        <div id="giacenza-lista" class="space-y-4">
            <div class="bg-white p-8 rounded-xl text-center text-gray-500 border shadow-sm">
                Inizializzazione in corso...
            </div>
        </div>

    </main>

    <footer class="bg-gray-200 border-t border-gray-300 py-3 text-center text-xs text-gray-600 font-medium mt-auto">
        🔒 Modalità Sola Lettura — Reparto Produzione / Spedizioni
    </footer>

    <script>
        // L'URL della tua Web App Google
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLoo9i7DxIFwcuiKSP1dv1DEBdMd9YPN59o_9qqGo7tAsutI6ua3UjEQF6_-ItSwSM/exec";

        // Funzione per formattare la data nel formato italiano (GG/MM/AAAA)
        function visualizzaDataItaliana(stringaData) {
            if (!stringaData) return "";
            const dataPulita = stringaData.toString().replace("'", "");
            const parti = dataPulita.split("-");
            if (parti.length === 3) {
                return `${parti[2]}/${parti[1]}/${parti[0]}`;
            }
            return new Date(dataPulita).toLocaleDateString('it-IT');
        }

        // Recupera i dati dal Cloud e li elabora mostrando anche gli articoli a zero
        async function caricaGiacenzeInTempoReale() {
            const container = document.getElementById('giacenza-lista');
            const loader = document.getElementById('stato-caricamento');
            const btnText = document.getElementById('btn-text');
            const txtUltimo = document.getElementById('ultimo-aggiornamento');

            loader.classList.remove('hidden');
            btnText.innerText = "Attendi...";

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                if (!response.ok) throw new Error("Errore di rete");
                const cloudData = await response.json();

                // I dati ora arrivano divisi in due gruppi
                const prodotti = cloudData.prodotti || [];
                const giacenze = cloudData.giacenze || [];

                if (prodotti.length === 0 && giacenze.length === 0) {
                    container.innerHTML = `
                        <div class="bg-white p-8 rounded-xl text-center text-gray-500 border shadow-sm">
                            📦 Il catalogo è vuoto e la cella è vuota.
                        </div>
                    `;
                } else {
                    const raggruppato = {};

                    // 1. Inseriamo PRIMA tutti i prodotti a catalogo (anche quelli che non hanno pedane)
                    prodotti.forEach(p => {
                        if (p.nome) {
                            raggruppato[p.nome.trim().toUpperCase()] = [];
                        }
                    });

                    // 2. Smistiamo le pedane effettive dentro i rispettivi prodotti
                    giacenze.forEach(item => {
                        const nomeProd = item.prodottoNome ? item.prodottoNome.trim().toUpperCase() : "ARTICOLO SCONOSCIUTO";
                        if (!raggruppato[nomeProd]) {
                            raggruppato[nomeProd] = [];
                        }
                        raggruppato[nomeProd].push({
                            lotto: item.lotto,
                            scadenza: item.scadenza,
                            quantita: parseInt(item.quantita)
                        });
                    });

                    // Ordiniamo alfabeticamente i nomi dei prodotti per avere una lista coerente
                    const nomiProdottiOrdinati = Object.keys(raggruppato).sort();

                    let html = '';
                    for (const prodotto of nomiProdottiOrdinati) {
                        const lotti = raggruppato[prodotto];
                        
                        // Ordiniamo i lotti per data di scadenza
                        lotti.sort((a, b) => new Date(a.scadenza) - new Date(b.scadenza));
                        const totalePedane = lotti.reduce((acc, curr) => acc + curr.quantita, 0);

                        // Impostiamo il colore in base alla giacenza (Grigio se è 0, Blu se ci sono pedane)
                        const badgeColor = totalePedane > 0 ? 'bg-blue-600' : 'bg-gray-400';

                        html += `
                            <div class="bg-white rounded-2xl shadow border border-gray-200 overflow-hidden">
                                <div class="bg-blue-50 px-4 py-3 flex justify-between items-center border-b border-gray-200">
                                    <span class="font-extrabold text-blue-900 tracking-wide">${prodotto}</span>
                                    <span class="${badgeColor} text-white text-xs px-3 py-1 rounded-full font-bold">Totale: ${totalePedane}</span>
                                </div>
                                <div class="p-3 divide-y divide-gray-100">
                        `;

                        // Se ci sono 0 pedane, mostriamo l'etichetta specifica invece di nascondere il prodotto
                        if (lotti.length === 0) {
                            html += `
                                <div class="text-center text-gray-400 py-3 text-sm font-medium italic">
                                    Nessuna pedana in cella
                                </div>
                            `;
                        } else {
                            lotti.forEach(l => {
                                html += `
                                    <div class="flex justify-between items-center py-2.5 text-sm">
                                        <div>
                                            <span class="font-bold text-gray-700">Lotto: ${l.lotto}</span>
                                            <span class="mx-2 text-gray-300">|</span>
                                            <span class="text-gray-500 font-medium">Scad: ${visualizzaDataItaliana(l.scadenza)}</span>
                                        </div>
                                        <span class="font-black text-gray-900 bg-gray-100 px-2.5 py-1 rounded-lg">${l.quantita} ped.</span>
                                    </div>
                                `;
                            });
                        }

                        html += `</div></div>`;
                    }
                    container.innerHTML = html;
                }

                // Aggiorna l'orario a schermo
                const oraAttuale = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                txtUltimo.innerText = `Ultimo aggiornamento alle ore ${oraAttuale}`;

            } catch (error) {
                console.error("Errore recupero dati:", error);
                txtUltimo.innerText = "⚠️ Errore di connessione col Server Google";
                if (container.innerHTML.includes("Inizializzazione") || container.innerHTML.includes("Caricamento")) {
                    container.innerHTML = `
                        <div class="bg-red-50 border border-red-200 p-6 rounded-xl text-center text-red-700 font-semibold shadow-sm">
                            ❌ Impossibile caricare i dati.<br>Verifica la connessione internet e riprova.
                        </div>
                    `;
                }
            } finally {
                loader.classList.add('hidden');
                btnText.innerText = "Aggiorna";
            }
        }

        // Avvio automatico
        window.onload = () => {
            caricaGiacenzeInTempoReale();
            
            // Refresha la schermata da solo ogni 30 secondi
            setInterval(() => {
                caricaGiacenzeInTempoReale();
            }, 30000);
        };
    </script>
</body>
</html>
